<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grey's Hidden Levantine</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: #14100d;
      font-family: Georgia, "Times New Roman", serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .poster-wrap {
      width: min(100%, 1024px);
      display: flex;
      justify-content: center;
    }

    .poster-shell {
      position: relative;
      width: 100%;
      max-width: 1024px;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 12px 40px rgba(0,0,0,0.45);
      background: #14100d;
    }

    .poster {
      width: 100%;
      height: auto;
      display: block;
    }

    /* Invisible clickable zones over the visible QR codes */
    .hotspot {
      position: absolute;
      display: block;
      text-indent: -9999px;
      overflow: hidden;
      background: rgba(255,255,255,0);
      border-radius: 12px;
    }

    /*
      These percentages are based on the current approved image layout.
      If you slightly change the poster later, these may need tiny nudges.
    */

    /* Top left: Speakeasy */
    .hotspot-speakeasy {
      left: 2.4%;
      top: 3.2%;
      width: 11.4%;
      height: 10.9%;
    }

    /* Top right: Full Menu */
    .hotspot-menu {
      right: 2.4%;
      top: 3.2%;
      width: 11.4%;
      height: 10.9%;
    }

    /* Bottom right stack: Cash App */
    .hotspot-cashapp {
      left: 62.6%;
      top: 78.2%;
      width: 11.8%;
      height: 10.9%;
    }

    /* Bottom right stack: PayPal */
    .hotspot-paypal {
      left: 76.6%;
      top: 78.2%;
      width: 11.8%;
      height: 10.9%;
    }

    @media (max-width: 700px) {
      body {
        padding: 0;
      }

      .poster-wrap {
        width: 100%;
      }

      .poster-shell {
        border-radius: 0;
        box-shadow: none;
      }
    }

    @media print {
      @page {
        size: letter portrait;
        margin: 0;
      }

      html, body {
        background: #14100d !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      body {
        padding: 0;
      }

      .poster-wrap {
        width: 8.5in;
      }

      .poster-shell {
        width: 8.5in;
        border-radius: 0;
        box-shadow: none;
      }

      .poster {
        width: 8.5in;
        height: 11in;
        object-fit: cover;
      }
    }
  </style>
</head>
<body>
  <main class="poster-wrap">
    <section class="poster-shell">
      <img
        class="poster"
        src="flyer_with_real_qr.png"
        alt="Grey's Hidden Levantine vintage poster"
      />

      <a
        class="hotspot hotspot-speakeasy"
        href="https://www.eventbrite.com/e/behind-closed-doors-a-reiki-infused-lebanese-speakeasy-dinner-tickets-1987281133366?aff=oddtdtcreator"
        target="_blank"
        rel="noopener noreferrer"
      >
        Speakeasy Details
      </a>

      <a
        class="hotspot hotspot-menu"
        href="https://greyethereus.github.io/lebanese-food/"
        target="_blank"
        rel="noopener noreferrer"
      >
        Full Menu
      </a>

      <a
        class="hotspot hotspot-cashapp"
        href="https://cash.app/$ancientwhitewitch"
        target="_blank"
        rel="noopener noreferrer"
      >
        Cash App Click on the QR code
      </a>

      <a
        class="hotspot hotspot-paypal"
        href="https://paypal.me/graceaj81"
        target="_blank"
        rel="noopener noreferrer"
      >
        PayPal
      </a>
    </section>
  </main>
</body>
</html>
